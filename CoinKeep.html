<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบออมเงิน โรงเรียนบ้านโคกตา</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] },
                    colors: {
                        brand: { blue: '#1e3a8a', yellow: '#facc15', white: '#ffffff', light: '#f3f4f6' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        input, select, textarea { font-size: 16px !important; } /* กันซูมมือถือ */
    </style>
</head>
<body class="text-gray-800 h-screen overflow-hidden flex flex-col">

<script>
    let currentUser = null;
    let currentChart = null;
    let appData = { users: [], savings: [] };
    
    const isGasEnvironment = (typeof google !== 'undefined' && google.script && google.script.run);

    function callBackend(funcName, ...args) {
        return new Promise((resolve, reject) => {
            if (isGasEnvironment) {
                google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[funcName](...args);
            } else {
                Swal.fire('โหมดจำลอง', 'ระบบนี้ต้องรันผ่าน Google Apps Script เพื่อทำงานจริง', 'info');
                reject('Not in GAS environment');
            }
        });
    }
    
    function getAvailableClasses() {
        const classes = new Set();
        appData.users.forEach(u => { if(u.Role === 'student' && u.Class) classes.add(u.Class); });
        return Array.from(classes).sort();
    }

    // คำนวณยอดเงินสุทธิ (ฝาก - ถอน)
    function calcNetBalance(savingsArray) {
        return savingsArray.reduce((sum, s) => {
            const amt = parseFloat(s.Amount || 0);
            return sum + (s.Type === 'ถอน' ? -amt : amt);
        }, 0);
    }

    // สร้างไอคอนประจำตัว (ชาย/หญิง)
    function getAvatarHtml(title) {
        const isMale = ['นาย', 'เด็กชาย', 'ด.ช.'].includes(title);
        const isFemale = ['นาง', 'นางสาว', 'เด็กหญิง', 'ด.ญ.'].includes(title);
        const icon = isMale ? 'fa-user-tie' : (isFemale ? 'fa-user' : 'fa-user');
        const color = isMale ? 'bg-blue-500' : (isFemale ? 'bg-pink-500' : 'bg-gray-400');
        return `<div class="w-10 h-10 rounded-full ${color} flex items-center justify-center text-white text-xl shadow-inner border-2 border-white/20"><i class="fas ${icon}"></i></div>`;
    }
</script>

<div id="login-screen" class="min-h-screen flex items-center justify-center bg-brand-blue relative overflow-hidden px-4">
    <div class="absolute top-0 left-0 w-64 h-64 bg-white opacity-5 rounded-full -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-brand-yellow opacity-10 rounded-full translate-x-1/3 translate-y-1/3"></div>
    
    <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-2xl w-full max-w-md z-10 relative">
        <div class="text-center mb-8">
            <div class="inline-block bg-brand-yellow p-4 rounded-full mb-4 shadow-lg">
                <i class="fas fa-wallet text-4xl text-brand-blue"></i>
            </div>
            <h1 class="text-2xl font-bold text-brand-blue">ระบบออมเงิน</h1>
            <p class="text-gray-500 font-medium mt-1">โรงเรียนบ้านโคกตา</p>
        </div>
        
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="mb-5">
                <label class="block text-gray-700 text-sm font-bold mb-2">ชื่อผู้ใช้งาน (Username)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fas fa-user text-gray-400"></i></div>
                    <input class="shadow-sm appearance-none border border-gray-300 rounded-lg w-full py-3 pl-10 pr-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-brand-blue transition-all" id="username" type="text" placeholder="กรอกชื่อผู้ใช้งาน" required>
                </div>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">รหัสผ่าน (Password)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fas fa-lock text-gray-400"></i></div>
                    <input class="shadow-sm appearance-none border border-gray-300 rounded-lg w-full py-3 pl-10 pr-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:ring-2 focus:ring-brand-blue transition-all" id="password" type="password" placeholder="กรอกรหัสผ่าน" required>
                </div>
            </div>
            <button class="w-full bg-brand-blue hover:bg-blue-900 text-white font-bold py-3 px-4 rounded-lg focus:outline-none focus:shadow-outline transition-colors shadow-md flex justify-center items-center gap-2" type="submit" id="btn-login">
                เข้าสู่ระบบ
            </button>
            <div id="gas-setup-container" class="mt-4 hidden border-t pt-4">
                <button type="button" onclick="runSetupDatabase()" class="w-full bg-blue-50 hover:bg-blue-100 text-brand-blue font-bold py-3 px-4 rounded-lg border border-blue-200 transition-colors shadow-sm text-sm flex justify-center items-center gap-2">
                    <i class="fas fa-database text-lg"></i> สร้างฐานข้อมูลครั้งแรก
                </button>
            </div>
        </form>
    </div>
</div>

<div id="main-app" class="hidden flex h-screen bg-gray-50 w-full relative">
    <aside id="sidebar" class="bg-brand-blue text-white w-64 flex-shrink-0 sidebar-transition absolute inset-y-0 left-0 z-30 transform -translate-x-full md:relative md:translate-x-0 shadow-xl flex flex-col">
        <div class="h-16 flex items-center justify-between px-4 bg-blue-900 border-b border-blue-800">
            <div class="flex items-center gap-3"><i class="fas fa-coins text-brand-yellow text-xl"></i><span class="font-bold text-lg truncate">บ้านโคกตา</span></div>
            <button class="md:hidden text-white" onclick="toggleSidebar()"><i class="fas fa-times text-xl"></i></button>
        </div>
        
        <div class="p-4 flex items-center gap-3 border-b border-blue-800 relative">
            <div id="user-avatar-container"></div>
            <div class="overflow-hidden flex-1">
                <p class="font-semibold text-sm truncate" id="user-display-name">ชื่อผู้ใช้</p>
                <p class="text-xs text-blue-300 capitalize" id="user-role-badge">Role</p>
            </div>
            <!-- ปุ่มตั้งค่าโปรไฟล์ส่วนตัว (แสดงเฉพาะแอดมิน/ครู) -->
            <button id="btn-edit-profile" onclick="editMyProfile()" class="text-blue-300 hover:text-white transition-colors p-2 hidden rounded-full hover:bg-blue-800" title="แก้ไขข้อมูลส่วนตัว">
                <i class="fas fa-cog"></i>
            </button>
        </div>

        <nav class="flex-1 overflow-y-auto py-4" id="sidebar-menu"></nav>

        <div class="p-4 border-t border-blue-800 bg-blue-900/50">
            <button onclick="handleLogout()" class="w-full flex items-center justify-center gap-3 text-white hover:text-red-300 hover:bg-blue-800 py-2.5 px-4 rounded-lg transition-colors border border-transparent hover:border-red-900/50">
                <i class="fas fa-sign-out-alt"></i><span class="font-medium">ออกจากระบบ</span>
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-4 z-20 border-b border-gray-200">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-brand-blue hover:bg-blue-50 p-2 rounded-md focus:outline-none transition-colors" onclick="toggleSidebar()"><i class="fas fa-bars text-xl"></i></button>
                <h2 class="text-xl font-bold text-gray-800" id="page-title">แดชบอร์ด</h2>
            </div>
            <div class="flex items-center gap-3 text-sm font-medium text-gray-600">
                <button onclick="refreshData()" class="text-brand-blue hover:bg-blue-50 p-2 rounded-full transition-colors" title="รีเฟรชข้อมูลล่าสุด"><i class="fas fa-sync-alt"></i></button>
                <span class="hidden sm:inline-block bg-blue-50 text-brand-blue px-3 py-1.5 rounded-full border border-blue-100"><i class="far fa-calendar-alt mr-1"></i> <span id="current-date"></span></span>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-6 bg-gray-50 relative" id="app-content"></main>
        
        <footer class="bg-white border-t p-3 text-center text-xs text-gray-500 shadow-[0_-2px_10px_rgba(0,0,0,0.02)]">
            <p>พัฒนาโดยครูมิน อลีมิน เจ๊ะอีซอ : ครูโรงเรียนบ้านเจ๊ะยอ</p>
        </footer>
    </div>
    
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-20 hidden md:hidden" onclick="toggleSidebar()"></div>
</div>

<script>
    document.getElementById('current-date').textContent = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });

    if (isGasEnvironment) document.getElementById('gas-setup-container').classList.remove('hidden');

    async function runSetupDatabase() {
        try {
            Swal.fire({ title: 'กำลังตรวจสอบและสร้างฐานข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
            const response = await callBackend('setupDatabase');
            Swal.fire('สำเร็จ!', response, 'success');
        } catch (error) { Swal.fire('ข้อผิดพลาด', error.message || error, 'error'); }
    }

    async function handleLogin(e) {
        e.preventDefault();
        const userVal = document.getElementById('username').value.trim();
        const passVal = document.getElementById('password').value.trim();
        const btn = document.getElementById('btn-login');
        
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังตรวจสอบ...'; btn.disabled = true;

        try {
            const res = await callBackend('serverLogin', userVal, passVal);
            if(res.success) {
                currentUser = res.user;
                await processLoginSuccess();
            } else Swal.fire('ข้อผิดพลาด!', res.message, 'error');
        } catch (error) { Swal.fire('ข้อผิดพลาดระบบ', error.message || error, 'error'); } 
        finally { btn.innerHTML = 'เข้าสู่ระบบ'; btn.disabled = false; }
    }

    async function processLoginSuccess() {
        const fullName = `${currentUser.title}${currentUser.firstName} ${currentUser.lastName}`;
        document.getElementById('user-display-name').textContent = fullName;
        document.getElementById('user-role-badge').textContent = currentUser.role === 'admin' ? 'ผู้ดูแลระบบ' : (currentUser.role === 'teacher' ? 'คุณครู' : 'นักเรียน');
        
        // กำหนดรูปอวตารแทนข้อความ
        document.getElementById('user-avatar-container').innerHTML = getAvatarHtml(currentUser.title);

        // เปิดปุ่มแก้ไขโปรไฟล์เฉพาะแอดมินและครู
        if(currentUser.role === 'admin' || currentUser.role === 'teacher') {
            document.getElementById('btn-edit-profile').classList.remove('hidden');
        }
        
        buildMenu();
        
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        
        await refreshData(false); 
        Swal.fire({ title: 'เข้าสู่ระบบสำเร็จ!', text: `ยินดีต้อนรับ ${fullName}`, icon: 'success', timer: 1500, showConfirmButton: false });
        navigate('dashboard');
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('sidebar-overlay').classList.toggle('hidden');
    }

    function handleLogout() {
        Swal.fire({
            title: 'ต้องการออกจากระบบ?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#1e3a8a', confirmButtonText: 'ใช่, ออกจากระบบ', cancelButtonText: 'ยกเลิก'
        }).then((result) => {
            if (result.isConfirmed) location.reload();
        });
    }

    async function refreshData(showAlert = true) {
        if(!currentUser) return;
        if(showAlert) Swal.fire({ title: 'กำลังดึงข้อมูลล่าสุด...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
        try {
            const data = await callBackend('fetchAppData', currentUser.role, currentUser.sysId, currentUser.classId);
            appData = data;
            const activeMenu = document.querySelector('.menu-item.bg-blue-800');
            if(activeMenu) navigate(activeMenu.dataset.target);
            if(showAlert) Swal.close();
        } catch(error) { Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถดึงข้อมูลได้', 'error'); }
    }

    // แก้ไขข้อมูลส่วนตัว
    function editMyProfile() {
        Swal.fire({
            title: 'แก้ไขข้อมูลส่วนตัว',
            html: `
                <div class="grid grid-cols-1 gap-4 text-left mt-2">
                    <div><label class="block text-xs font-bold text-gray-700 mb-1">คำนำหน้า</label><select id="my-title" class="border p-2.5 rounded-lg w-full text-sm outline-none"><option ${currentUser.title=='นาย'?'selected':''}>นาย</option><option ${currentUser.title=='นาง'?'selected':''}>นาง</option><option ${currentUser.title=='นางสาว'?'selected':''}>นางสาว</option></select></div>
                    <div><label class="block text-xs font-bold text-gray-700 mb-1">ชื่อ</label><input id="my-fname" class="border p-2.5 rounded-lg w-full text-sm outline-none" value="${currentUser.firstName}"></div>
                    <div><label class="block text-xs font-bold text-gray-700 mb-1">สกุล</label><input id="my-lname" class="border p-2.5 rounded-lg w-full text-sm outline-none" value="${currentUser.lastName}"></div>
                    <div class="border-t pt-3 mt-1">
                        <label class="block text-xs font-bold text-gray-700 mb-1">ตั้งรหัสผ่านใหม่</label>
                        <input id="my-pass" type="password" class="border p-2.5 rounded-lg w-full text-sm outline-none" placeholder="เว้นว่างไว้หากไม่ต้องการเปลี่ยนรหัสผ่าน">
                    </div>
                </div>
            `,
            showCancelButton: true, confirmButtonText: 'บันทึกข้อมูล', cancelButtonText: 'ยกเลิก', confirmButtonColor: '#1e3a8a',
            preConfirm: () => {
                const f = document.getElementById('my-fname').value.trim();
                const p = document.getElementById('my-pass').value.trim();
                if(!f) { Swal.showValidationMessage('กรุณากรอกชื่อ'); return false; }
                const myFullData = appData.users.find(u => u.SysID === currentUser.sysId);
                return {
                    sysId: currentUser.sysId,
                    title: document.getElementById('my-title').value,
                    firstName: f,
                    lastName: document.getElementById('my-lname').value.trim(),
                    password: p || myFullData.Password
                }
            }
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                const res = await callBackend('updateMyProfile', currentUser.sysId, result.value);
                if(res.success) {
                    Swal.fire('สำเร็จ', 'อัปเดตโปรไฟล์แล้ว กรุณาล็อกอินใหม่เพื่อใช้งานข้อมูลล่าสุด', 'success').then(() => location.reload());
                } else Swal.fire('ผิดพลาด', res.message, 'error');
            }
        });
    }

    function buildMenu() {
        const menuContainer = document.getElementById('sidebar-menu');
        menuContainer.innerHTML = '';
        let menus = [];
        
        if (currentUser.role === 'admin') {
            menus = [
                { id: 'dashboard', icon: 'fas fa-chart-pie', text: 'ภาพรวม (Dashboard)' },
                { id: 'manage-teachers', icon: 'fas fa-chalkboard-teacher', text: 'จัดการข้อมูลครู' },
                { id: 'manage-students', icon: 'fas fa-user-graduate', text: 'จัดการข้อมูลนักเรียน' },
                { id: 'all-savings', icon: 'fas fa-list-alt', text: 'ข้อมูลการออมทั้งหมด' }
            ];
        } else if (currentUser.role === 'teacher') {
            menus = [
                { id: 'dashboard', icon: 'fas fa-chart-line', text: 'ภาพรวมห้องเรียน' },
                { id: 'record-batch', icon: 'fas fa-users-viewfinder', text: 'บันทึกออมกลุ่ม (ฝาก)' },
                { id: 'record-single', icon: 'fas fa-hand-holding-usd', text: 'ทำรายการ (ฝาก/ถอน)' },
                { id: 'savings-data', icon: 'fas fa-clipboard-list', text: 'ข้อมูลการออมเงิน' },
                { id: 'my-students', icon: 'fas fa-users', text: 'ข้อมูลนักเรียนในที่ปรึกษา' }
            ];
        } else if (currentUser.role === 'student') {
            menus = [
                { id: 'dashboard', icon: 'fas fa-wallet', text: 'ข้อมูลเงินออมของฉัน' },
                { id: 'history', icon: 'fas fa-history', text: 'ประวัติการออมเงิน' }
            ];
        }

        menus.forEach(m => {
            const link = document.createElement('a'); link.href = '#';
            link.className = 'menu-item flex items-center gap-3 px-6 py-3 text-blue-100 hover:bg-blue-800 hover:text-brand-yellow transition-colors border-l-4 border-transparent';
            link.onclick = (e) => { e.preventDefault(); navigate(m.id); if(window.innerWidth < 768) toggleSidebar(); };
            link.dataset.target = m.id;
            link.innerHTML = `<div class="w-6 text-center"><i class="${m.icon}"></i></div> <span class="font-medium">${m.text}</span>`;
            menuContainer.appendChild(link);
        });
    }

    function navigate(viewId) {
        document.querySelectorAll('.menu-item').forEach(el => {
            el.classList.remove('bg-blue-800', 'text-brand-yellow', 'border-brand-yellow');
            el.classList.add('border-transparent');
            if (el.dataset.target === viewId) {
                el.classList.add('bg-blue-800', 'text-brand-yellow', 'border-brand-yellow');
                el.classList.remove('border-transparent');
            }
        });

        const content = document.getElementById('app-content');
        if (currentChart) { currentChart.destroy(); currentChart = null; }

        switch(viewId) {
            case 'dashboard':
                if(currentUser.role === 'admin') renderAdminDashboard(content);
                else if(currentUser.role === 'teacher') renderTeacherDashboard(content);
                else renderStudentDashboard(content); break;
            case 'manage-teachers': renderManageTeachers(content); break;
            case 'manage-students': renderManageStudents(content); break;
            case 'all-savings': renderAllSavings(content); break;
            case 'record-batch': renderRecordBatch(content); break;
            case 'record-single': renderRecordSingle(content); break;
            case 'savings-data': renderSavingsData(content); break;
            case 'my-students': renderMyStudents(content); break;
            case 'history': renderStudentHistory(content); break;
        }
    }

    function filterTable(tableId, query) {
        const trs = document.querySelectorAll(`#${tableId} tbody tr`);
        query = query.toLowerCase();
        trs.forEach(tr => { tr.style.display = tr.innerText.toLowerCase().includes(query) ? '' : 'none'; });
    }

    function renderAdminDashboard(container) {
        document.getElementById('page-title').textContent = 'ภาพรวมระบบโรงเรียน';
        const students = appData.users.filter(u => u.Role === 'student');
        const teachers = appData.users.filter(u => u.Role === 'teacher');
        
        // คำนวณยอดเงินสุทธิ
        const totalNetBalance = calcNetBalance(appData.savings);
        
        const todayStr = new Date().toISOString().split('T')[0];
        // คำนวณยอดฝากเข้าเฉพาะวันนี้
        const todayDeposits = appData.savings.filter(s => s.Date.startsWith(todayStr) && s.Type === 'ฝาก').reduce((sum, s) => sum + parseFloat(s.Amount || 0), 0);

        container.innerHTML = `
            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 mb-6">
                <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 flex flex-col">
                    <div class="flex justify-between items-start mb-2"><p class="text-sm text-gray-500 font-medium">ยอดเงินออมสุทธิทั้งหมด</p><div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-brand-blue"><i class="fas fa-coins"></i></div></div>
                    <h3 class="text-2xl font-bold text-brand-blue">฿${totalNetBalance.toLocaleString()}</h3>
                </div>
                <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 flex flex-col">
                    <div class="flex justify-between items-start mb-2"><p class="text-sm text-gray-500 font-medium">ยอดฝากเข้าวันนี้</p><div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-green-600"><i class="fas fa-arrow-trend-up"></i></div></div>
                    <h3 class="text-2xl font-bold text-green-600">฿${todayDeposits.toLocaleString()}</h3>
                </div>
                <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 flex flex-col">

                <div class="relative w-full" style="height: 300px;"><canvas id="adminChart"></canvas></div>
            </div>
        `;
        
        const last30Days = {};
        for(let i=29; i>=0; i--) { let d = new Date(); d.setDate(d.getDate() - i); last30Days[d.toLocaleDateString('en-CA')] = 0; }
        
        appData.savings.forEach(s => {
            const d = new Date(s.Date).toLocaleDateString('en-CA');
            if(last30Days[d] !== undefined && s.Type === 'ฝาก') last30Days[d] += parseFloat(s.Amount || 0);
        });

        const ctx = document.getElementById('adminChart').getContext('2d');
        currentChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(last30Days).map(d => { const dt = new Date(d); return `${dt.getDate()}/${dt.getMonth()+1}`; }),
                datasets: [{ label: 'ยอดฝาก (บาท)', data: Object.values(last30Days), backgroundColor: '#1e3a8a', borderRadius: 4 }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    async function submitUserData(data) {
        try {
            Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
            const res = await callBackend('saveUser', data);
            if(res.success) { Swal.fire({title: 'สำเร็จ', icon: 'success', timer: 1000, showConfirmButton: false}); await refreshData(false); } 
            else Swal.fire('ล้มเหลว', res.message, 'error');
        } catch(e) { Swal.fire('ล้มเหลว', e.message, 'error'); }
    }

    async function deleteRecord(sheetName, id) {
        Swal.fire({ title: 'ยืนยันการลบ?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'ใช่, ลบเลย'
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
                const res = await callBackend('deleteRecord', sheetName, id);
                if(res.success) { await refreshData(false); Swal.close(); } else Swal.fire('Error', res.message, 'error');
            }
        });
    }

                <div class="text-right"><button onclick="batchSave()" class="bg-brand-blue hover:bg-blue-800 text-white font-bold py-3 px-8 rounded-lg shadow"><i class="fas fa-save mr-2"></i> บันทึกข้อมูลการออม</button></div>
            </div>
        `;
        // Load data for today initially
        setTimeout(loadBatchDataForDate, 100);
    }

    function loadBatchDataForDate() {
        const date = document.getElementById('save-date').value;
        document.querySelectorAll('.saving-input').forEach(input => {
            const sysId = input.dataset.sysid;
            // ดึงเฉพาะข้อมูล "ฝาก" ของวันนี้มาแสดง
            const existing = appData.savings.find(s => s.StudentSysID === sysId && s.Date.startsWith(date) && s.Type === 'ฝาก');
            input.value = existing ? existing.Amount : '';
            input.dataset.txid = existing ? existing.TransactionID : ''; // เก็บ txid ไว้ใช้อัปเดต
        });
    }

    async function batchSave() {
        const inputs = document.querySelectorAll('.saving-input');
        const date = document.getElementById('save-date').value;
        let transactions = [];
        
        inputs.forEach(input => {
            const amtText = input.value.trim();
            if (amtText !== '') {
                const amt = parseFloat(amtText);
                transactions.push({ 
                    date: date, studentSysId: input.dataset.sysid, amount: amt, 
                    recordedBy: currentUser.sysId, txId: input.dataset.txid // ส่ง txid ไปด้วย ถ้ามีแปลว่าอัปเดต
                });
            }
        });

        if (transactions.length === 0) return Swal.fire('แจ้งเตือน', 'กรุณากรอกจำนวนเงินอย่างน้อย 1 รายการ', 'warning');

        Swal.fire({
            title: 'ยืนยันการบันทึก?', text: `กำลังบันทึก ${transactions.length} รายการ (วันที่ ${date})`, icon: 'question',
            showCancelButton: true, confirmButtonColor: '#1e3a8a', confirmButtonText: 'ยืนยันบันทึก'
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                const res = await callBackend('saveTransactions', transactions);
                if(res.success) { Swal.fire({title:'สำเร็จ!', text:res.message, icon:'success', timer:1500, showConfirmButton:false}); await refreshData(false); loadBatchDataForDate(); } 
                else Swal.fire('ล้มเหลว', res.message, 'error');
            }
        });
    }

    function renderRecordSingle(container) {
        document.getElementById('page-title').textContent = 'ทำรายการ (รายบุคคล)';
        if(!currentUser.classId) return;

        const classStudents = appData.users.filter(u => u.Class === currentUser.classId && u.Role === 'student')
                                           .sort((a, b) => parseInt(a.RollNo||0) - parseInt(b.RollNo||0));
        let studentOptions = '<option value="">-- เลือกนักเรียน --</option>';
        classStudents.forEach(st => { studentOptions += `<option value="${st.SysID}">เลขที่ ${st.RollNo || '-'} : ${st.Title}${st.FirstName} ${st.LastName}</option>`; });

        container.innerHTML = `
            <div class="max-w-lg mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <h3 class="font-bold text-lg mb-4 text-brand-blue border-b pb-2"><i class="fas fa-handshake mr-2"></i>ทำรายการ ฝาก / ถอน</h3>
                <div class="space-y-4">
                    <div><label class="block text-sm font-bold mb-1">วันที่ทำรายการ</label><input type="date" id="single-date" value="${new Date().toISOString().split('T')[0]}" class="w-full border p-2.5 rounded focus:outline-none focus:border-brand-blue"></div>
                    <div><label class="block text-sm font-bold mb-1">ชื่อนักเรียน</label><select id="single-student" onchange="checkStudentBalance()" class="w-full border p-2.5 rounded focus:outline-none focus:border-brand-blue">${studentOptions}</select></div>
                    <div id="balance-display" class="hidden text-sm bg-blue-50 text-blue-700 p-2 rounded"><i class="fas fa-wallet mr-1"></i> ยอดคงเหลือ: <strong id="single-balance">0</strong> บาท</div>
                    <div><label class="block text-sm font-bold mb-1">ประเภทรายการ</label><select id="single-type" class="w-full border p-2.5 rounded focus:outline-none focus:border-brand-blue"><option value="ฝาก">ฝากเงิน (เงินเพิ่ม)</option><option value="ถอน">ถอนเงิน (เงินลด)</option></select></div>
                    <div><label class="block text-sm font-bold mb-1">จำนวนเงิน (บาท)</label><input type="number" id="single-amount" min="1" class="w-full border p-2.5 rounded font-bold text-lg text-brand-blue focus:outline-none focus:border-brand-blue" placeholder="0"></div>
                    <button onclick="saveSingleTx()" class="w-full bg-brand-blue hover:bg-blue-800 text-white font-bold py-3 rounded-lg shadow transition-colors mt-2"><i class="fas fa-check-circle mr-2"></i> บันทึกรายการ</button>
                </div>
            </div>
        `;
    }

    // คำนวณยอดเงินคงเหลือของเด็กเพื่อแสดงตอนถอน
    function checkStudentBalance() {
        const sysId = document.getElementById('single-student').value;
        const display = document.getElementById('balance-display');
        if(!sysId) { display.classList.add('hidden'); return; }
        
        const stuSaves = appData.savings.filter(s => s.StudentSysID === sysId);
        const net = calcNetBalance(stuSaves);
        document.getElementById('single-balance').textContent = net.toLocaleString();
        display.classList.remove('hidden');
        display.dataset.net = net; // เก็บไว้เช็คค่า
    }

    async function saveSingleTx() {
        const date = document.getElementById('single-date').value;
        const studentSysId = document.getElementById('single-student').value;
        const type = document.getElementById('single-type').value;
        const amount = parseFloat(document.getElementById('single-amount').value);

        if(!studentSysId || !amount || amount <= 0) return Swal.fire('เตือน', 'กรุณากรอกข้อมูลให้ครบและจำนวนเงินต้องมากกว่า 0', 'warning');
        
        // เช็คยอดตอนถอน
        if(type === 'ถอน') {
            const currentNet = parseFloat(document.getElementById('balance-display').dataset.net || 0);
            if(amount > currentNet) return Swal.fire('ถอนไม่ได้!', `ยอดเงินคงเหลือไม่พอ (มีอยู่ ${currentNet} บาท)`, 'error');
        }

        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        const res = await callBackend('saveSingleTransaction', { date, studentSysId, type, amount, recordedBy: currentUser.sysId });
        if(res.success) {
            Swal.fire('สำเร็จ', res.message, 'success');
            document.getElementById('single-amount').value = '';
            await refreshData(false);
            checkStudentBalance(); // อัปเดตยอดคงเหลือโชว์
        } else { Swal.fire('ผิดพลาด', res.message, 'error'); }
    }

    function renderSavingsData(container) {
        document.getElementById('page-title').textContent = 'รายงานข้อมูลการออมเงิน';
        const classStudents = appData.users.filter(u => u.Class === currentUser.classId && u.Role === 'student');
        let options = '<option value="ALL">-- นักเรียนทั้งหมด --</option>';
        classStudents.forEach(st => { options += `<option value="${st.SysID}">${st.Title}${st.FirstName} ${st.LastName}</option>`; });

        container.innerHTML = `
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-4">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div><label class="text-xs font-bold text-gray-500">นักเรียน</label><select id="filter-stu" onchange="filterSavings()" class="w-full border p-2 rounded text-sm">${options}</select></div>
                    <div><label class="text-xs font-bold text-gray-500">วันที่ทำรายการ</label><input type="date" id="filter-date" onchange="filterSavings()" class="w-full border p-2 rounded text-sm"></div>
                    <div><label class="text-xs font-bold text-gray-500">ประเภท</label><select id="filter-type" onchange="filterSavings()" class="w-full border p-2 rounded text-sm"><option value="ALL">ทั้งหมด</option><option value="ฝาก">เฉพาะรายการ ฝาก</option><option value="ถอน">เฉพาะรายการ ถอน</option></select></div>
                    <div class="flex items-end"><button onclick="document.getElementById('filter-date').value=''; filterSavings();" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded text-sm font-bold border border-gray-200"><i class="fas fa-times"></i> ล้างตัวกรองวันที่</button></div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto"><table class="w-full text-left text-sm whitespace-nowrap"><thead class="bg-gray-100 border-b"><tr><th class="p-3">วันที่</th><th class="p-3">รหัสนักเรียน</th><th class="p-3">ชื่อ-สกุล</th><th class="p-3">ทำรายการ</th><th class="p-3 text-right">จำนวนเงิน</th><th class="p-3 text-center">ผู้บันทึก</th></tr></thead><tbody id="savings-tbody"></tbody></table></div>
            </div>
        `;
        filterSavings();
    }

    function filterSavings() {
        const stuId = document.getElementById('filter-stu').value;
        const date = document.getElementById('filter-date').value;
        const type = document.getElementById('filter-type').value;
        
        let filtered = appData.savings.filter(s => {
            // ครูดูได้เฉพาะเด็กในห้อง (appData.savings กรองมาให้แล้วจาก backend)
            let match = true;
            if (stuId !== 'ALL' && s.StudentSysID !== stuId) match = false;
            if (date && !s.Date.startsWith(date)) match = false;
            if (type !== 'ALL' && s.Type !== type) match = false;
            return match;
        }).sort((a,b) => new Date(b.Date) - new Date(a.Date)); // เรียงใหม่ล่าสุดขึ้นก่อน

        let html = filtered.map(s => {
            const u = appData.users.find(x => x.SysID === s.StudentSysID);
            const dt = new Date(s.Date).toLocaleDateString('th-TH');
            const typeStyle = s.Type === 'ถอน' ? 'text-red-500 bg-red-50' : 'text-green-600 bg-green-50';
            const icon = s.Type === 'ถอน' ? 'fa-arrow-down' : 'fa-arrow-up';
            return `<tr class="border-b hover:bg-gray-50"><td class="p-3">${dt}</td><td class="p-3 font-mono">${u ? u.StudentID : '-'}</td><td class="p-3">${u ? u.Title+u.FirstName+' '+u.LastName : '-'}</td><td class="p-3"><span class="px-2 py-1 rounded text-xs font-bold ${typeStyle}"><i class="fas ${icon} mr-1"></i>${s.Type}</span></td><td class="p-3 text-right font-bold ${s.Type==='ถอน'?'text-red-500':'text-green-600'}">฿${parseFloat(s.Amount).toLocaleString()}</td><td class="p-3 text-center text-xs text-gray-500">${s.RecordedByName}</td></tr>`;
        }).join('');
        
        document.getElementById('savings-tbody').innerHTML = html || '<tr><td colspan="6" class="text-center p-8 text-gray-500">ไม่พบข้อมูลตามเงื่อนไข</td></tr>';
    }

    function renderMyStudents(container) {
        document.getElementById('page-title').textContent = 'ข้อมูลนักเรียนในความดูแล';
        const classStudents = appData.users.filter(u => u.Class === currentUser.classId && u.Role === 'student');
        let html = classStudents.map(u => `<tr class="border-b hover:bg-gray-50"><td class="p-3 text-center text-gray-500">${u.RollNo || '-'}</td><td class="p-3 font-mono font-bold">${u.StudentID || '-'}</td><td class="p-3">${u.Title}${u.FirstName} ${u.LastName}</td><td class="p-3 font-mono text-sm text-blue-600 bg-blue-50/50">${u.Username}</td><td class="p-3 font-mono text-sm text-gray-600 bg-blue-50/50">${u.Password}</td></tr>`).join('');
        container.innerHTML = `<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-left text-sm whitespace-nowrap"><thead class="bg-gray-100 border-b"><tr><th class="p-3 text-center w-16">เลขที่</th><th class="p-3">รหัส ID (นักเรียน)</th><th class="p-3">ชื่อ-สกุล</th><th class="p-3 bg-blue-50/50">Username</th><th class="p-3 bg-blue-50/50">Password</th></tr></thead><tbody>${classStudents.length > 0 ? html : '<tr><td colspan="5" class="text-center p-8 text-gray-500">ไม่มีข้อมูลนักเรียน</td></tr>'}</tbody></table></div></div>`;

    function renderStudentHistory(container) {
        document.getElementById('page-title').textContent = 'ประวัติการทำรายการ';
        const mySavings = appData.savings.filter(s => s.StudentSysID === currentUser.sysId).sort((a,b) => new Date(b.Date) - new Date(a.Date));

        let trHtml = mySavings.map((s, i) => {
            const dateStr = new Date(s.Date).toLocaleDateString('th-TH', {year:'numeric', month:'short', day:'numeric'});
            const isWithdraw = s.Type === 'ถอน';
            const icon = isWithdraw ? 'fa-arrow-down text-red-500' : 'fa-arrow-up text-green-500';
            const amountColor = isWithdraw ? 'text-red-500' : 'text-green-600';
            const sign = isWithdraw ? '-' : '+';
            
            return `<tr class="border-b hover:bg-gray-50 transition-colors">
                <td class="p-4 text-center text-gray-500">${i+1}</td>

                <td class="p-4 text-right font-bold ${amountColor} text-lg">${sign}฿${parseFloat(s.Amount).toLocaleString()}</td>
